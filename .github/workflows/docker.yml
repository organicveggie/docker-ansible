name: Docker

on:
  pull_request:
    branches:
      - main
  push:
    branches: ["main"]
    # Avoid re-triggering a full "edge" rebuild when update-readme commits
    # the regenerated tags table back to main.
    paths-ignore: ["README.md"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        python: [3.12, 3.13, 3.14]
        platform: [linux/amd64, linux/arm64]
        os-config:
          - { os: "debian", release: "bookworm" }
          - { os: "debian", release: "trixie" }
          - { os: "ubuntu", release: "24.04" }
          - { os: "ubuntu", release: "25.10" }
          - { os: "ubuntu", release: "26.04" }

    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    name: Build py${{ matrix.python }}--${{ matrix.os-config.release }}-${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Artifact names cannot contain slashes, so convert linux/amd64 → linux-amd64.
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Push by digest only (no tag yet) so each platform image lands in the
      # registry without polluting the tag namespace before the manifest merge.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/${{ matrix.python }}/${{ matrix.os-config.os }}/${{ matrix.os-config.release }}/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: IMAGE_BUILD_VERSION=${{ github.ref_name }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=py${{ matrix.python }}-${{ matrix.os-config.os }}-${{ matrix.os-config.release }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=py${{ matrix.python }}-${{ matrix.os-config.os }}-${{ matrix.os-config.release }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-py${{ matrix.python }}-${{ matrix.os-config.os }}-${{ matrix.os-config.release }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Skip this job for pull requests. We only want to merge and tag images on pushes to main or tags.
  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python: [3.12, 3.13, 3.14]
        platform: [linux/amd64, linux/arm64]
        os-config:
          - { os: "debian", release: "bookworm" }
          - { os: "debian", release: "trixie" }
          - { os: "ubuntu", release: "24.04" }
          - { os: "ubuntu", release: "25.10" }
          - { os: "ubuntu", release: "26.04" }

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-py${{ matrix.python }}-${{ matrix.os-config.os }}-${{ matrix.os-config.release }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          PYTHON="${{ matrix.python }}"
          RELEASE="${{ matrix.os-config.release }}"
          SUFFIX="-py${PYTHON}-${RELEASE}"

          ARGS=""
          PRIMARY=""

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"

            # release_tags() mirrors this combo's full tag set (version,
            # major.minor, major, "*-latest", release alias variants, and
            # canonical bare tags for the trixie+3.14 combo).
            while IFS= read -r tag; do
              ARGS+=" -t ${IMAGE}:${tag}"
            done < <(python3 "${GITHUB_WORKSPACE}/scripts/compute_tags.py" --version "$VERSION" --python "$PYTHON" --os-release "$RELEASE")

            PRIMARY="${IMAGE}:${VERSION}${SUFFIX}"
          fi

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            ARGS+=" -t ${IMAGE}:edge${SUFFIX}"

            # (trixie, 3.14) also gets the bare edge tag.
            if [ "$RELEASE" = "trixie" ] && [ "$PYTHON" = "3.14" ]; then
              ARGS+=" -t ${IMAGE}:edge"
            fi

            PRIMARY="${IMAGE}:edge${SUFFIX}"
          fi

          echo "args=${ARGS}" >> $GITHUB_OUTPUT
          echo "primary=${PRIMARY}" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            ${{ steps.tags.outputs.args }} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ steps.tags.outputs.primary }}
      
  notify:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Trigger downstream build
        run: |
          gh api repos/organicveggie/ansible-devcontainer/dispatches --input - <<EOF
          {
            "event_type": "base-image-updated",
            "client_payload": {
              "ref": "${{ github.ref_name }}"
            }
          }
          EOF
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_NOTIFY_PAT }}

  update-readme:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PR_BYPASS_APP_ID }}
          private-key: ${{ secrets.PR_BYPASS_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Regenerate README tags table
        run: python3 scripts/update_readme_tags.py --version "${{ github.ref_name }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "docs: update tags table for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main
