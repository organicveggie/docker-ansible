name: Combine PRs

on:
  workflow_dispatch: # Allows you to run it manually via the Actions tab

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  combine-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Use GitHub App Token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ vars.COMBINE_PRS_CLIENT_ID }}
          private-key: ${{ secrets.COMBINE_PRS_PRIVATE_KEY }}

      - name: Combine Dependabot PRs
        uses: github/combine-prs@v5.2.0
        with:
          branch_prefix: "dependabot"
          combine_branch_name: "combined-dependabot-updates"
          github_token: ${{ steps.generate-token.outputs.token }}
          labels: combined-pr
          pr_title: "chore(deps): Combined Dependabot Updates"
