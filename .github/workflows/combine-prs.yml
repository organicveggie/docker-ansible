name: Combine PRs

on:
  workflow_dispatch: # Allows you to run it manually via the Actions tab

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  combine-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Combine Dependabot PRs
        uses: github/combine-prs@v5
        with:
          branch_prefix: "dependabot"
          combine_branch_name: "combined-dependabot-updates"
          pr_title: "chore(deps): Combined Dependabot Updates"
